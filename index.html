<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Flurimo — Магазин</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
  
<style>

#categories {
  display: flex;
  gap: 12px;
  padding: 12px;
  justify-content: center;
  width: 100%;
  box-sizing: border-box;
}

#categories button {
  width: auto;
  flex: none;
  padding: 14px 28px;
  background: #f5eee8;
  color: #5a4638;
  border: 1px solid #ead8c9;
  border-radius: 18px;
  font-size: 15px;
  font-weight: 600;
}

#categories button:hover {
  background: #ead8c9;
}
  
<style>
body { font-family: Arial, sans-serif; margin: 0; background: #faf9f7; }
header.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 18px 12px;
  background: #fff;
}

.logo-icon {
  font-size: 34px;
}

.logo-title {
  font-size: 26px;
  font-weight: 700;
  color: #5a4638;
  letter-spacing: 1px;
}

.logo-subtitle {
  font-size: 13px;
  color: #8a7768;
  margin-top: 2px;
}

.card { background: #fff; margin: 12px; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,.05); }
.card img { width: 100%; height: 240px; object-fit: cover; }
.card-content { padding: 14px; }
.price { font-weight: bold; margin: 8px 0; }
.status { font-size: 13px; opacity: .6; margin-bottom: 10px; }
button { width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
button:disabled { background: #ccc; cursor: not-allowed; }

/* Фиксированная корзина */
#cartBox {
  position: fixed;
  top: 80px;
  right: 10px;
  width: 260px;
  background: #fff;
  padding: 14px;
  border-radius: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,.05);
  display: none;
  z-index: 1000;
}
#cartBox h3 { margin-top: 0; }
#cartList { list-style: none; padding: 0; margin: 0 0 10px 0; max-height: 300px; overflow-y: auto; }

#orderBox { display:none; margin-top:12px; padding:14px; background:#fff; border-radius:14px; box-shadow:0 2px 6px rgba(0,0,0,.05);}
input { width: 100%; padding: 10px; margin-bottom: 10px; font-size: 14px; border-radius: 6px; border: 1px solid #ccc; }
</style>
</head>
<body>
<header class="logo">
  <div class="logo-icon">🍓</div>
  <div>
    <div class="logo-title">Flurimo</div>
    <div class="logo-subtitle">украшения,которые влюбляют</div>
  </div>
</header>
 <div id="categories">
  <div id="categories">
  <button onclick="showBerry()">🍓 Ягодная коллекция</button>
</div>
   
<div id="catalog"></div>

<div id="cartBox">
  <h3>Корзина 🛒</h3>
  <ul id="cartList"></ul>
  <button onclick="openOrderForm()">Оформить корзину</button>
</div>

<div id="orderBox">
  <h3>Оформление заказа</h3>
  <input id="customerName" placeholder="Ваше имя">
  <input id="customerPhone" placeholder="Телефон">
  <button onclick="sendOrder()">Отправить заказ</button>
</div>

<script>
/* 🔗 Сюда вставь свою ссылку Web App с doGet */
const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwXpJHTIoEBvjtUkH0lK5pqvhfpMAKWHopgNbYRYrAPTmC3y4u53vIZ-N6hDYCVcCBVoA/exec";

/* 🛍 Товары */
const products = [
{category:"berry", name:"Браслет Малинка", description:"1", price:3000, quantity:1, image:"images/brasletmalina.jpg"},
{category:"berry", name:"Браслет Малинка жемчужная", description:"1", price:2000, quantity:1, image:"images/brasletmalinajemcju.jpg"},
{category:"berry", name:"Подвеска Малина", description:"1", price:1800, quantity:1, image:"images/podveskamalina.jpg"},
{category:"berryy", name:"Подвеска Ежевика", description:"1", price:1800, quantity:1, image:"images/podveskaejevika.jpg"},
{category:"berry", name:"Браслет Черника жемчужная", description:"1", price:2000, quantity:1, image:"images/braslechernikajemc.jpg"},
{category:"berry", name:"Браслет Черника", description:"1", price:2200, quantity:1, image:"images/braslechernika.jpg"},
{category:"berry", name:"Браслет Ежевика жемчужная", description:"1", price:2200, quantity:1, image:"images/braseja.jpg"},
{category:"berry", name:"Серьги Ежевика", description:"1", price:1500, quantity:1, image:"images/sergiej.jpg"}  
];

let cart = [];
const catalog = document.getElementById("catalog");

/* Создание карточек товаров */
function renderProducts(list){
  catalog.innerHTML = "";

  list.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    const disabled = p.quantity <= 0;

    card.innerHTML = `
      <img src="${p.image}" alt="${p.name}">
      <div class="card-content">
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        <div class="status">
          ${disabled ? "Нет в наличии" : "В наличии: " + p.quantity}
        </div>
        <div class="price">${p.price} ₽</div>
        <button ${disabled ? "disabled" : ""}
          onclick="addToCart('${p.name}',${p.price},1)">
          Добавить в корзину
        </button>
      </div>
    `;

    catalog.appendChild(card);
  });
}

function showBerry(){
  const berry = products.filter(p => p.category === "berry");
  renderProducts(berry);
}

showBerry();
  
/* Добавление товара в корзину */
function addToCart(name, price, quantity){
  const existing = cart.find(i => i.name === name);
  if(existing) existing.quantity += quantity;
  else cart.push({name, price, quantity});
  updateCartDisplay();
}

/* Обновление видимой корзины */
function updateCartDisplay(){
  const cartBox = document.getElementById("cartBox");
  const cartList = document.getElementById("cartList");
  cartList.innerHTML = "";
  if(cart.length === 0){
    cartBox.style.display = "none";
    return;
  }
  cartBox.style.display = "block";
  cart.forEach(item=>{
    const li = document.createElement("li");
    li.textContent = `${item.name} — ${item.price} ₽ × ${item.quantity}`;
    cartList.appendChild(li);
  });
}

/* Открытие формы оформления */
function openOrderForm(){
  document.getElementById("orderBox").style.display = "block";
  window.scrollTo(0, document.body.scrollHeight);
}

/* Отправка заказа через doGet */
function sendOrder(){
  const customerName = document.getElementById("customerName").value;
  const customerPhone = document.getElementById("customerPhone").value;

  if(!customerName || !customerPhone){
    alert("Введите имя и телефон");
    return;
  }

  cart.forEach(item => {
    const url = `${GOOGLE_SHEET_URL}?name=${encodeURIComponent(item.name)}&price=${item.price}&quantity=${item.quantity}&customer_name=${encodeURIComponent(customerName)}&customer_phone=${encodeURIComponent(customerPhone)}`;
    fetch(url)
      .then(res => res.json())
      .then(()=>console.log("Заказ отправлен!"))
      .catch(()=>alert("❌ Ошибка отправки"));
  });

  alert("✅ Заказ отправлен!");
  cart = [];
  updateCartDisplay();
  document.getElementById("orderBox").style.display = "none";
  document.getElementById("customerName").value = "";
  document.getElementById("customerPhone").value = "";
}
</script>
</body>
</html>
