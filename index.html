<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Flurimo — Магазин</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial, sans-serif; margin: 0; background: #faf9f7; }
header { padding: 16px; text-align: center; font-size: 22px; font-weight: 600; }
.card { background: #fff; margin: 12px; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,.05); }
.card img { width: 100%; height: 240px; object-fit: cover; }
.card-content { padding: 14px; }
.price { font-weight: bold; margin: 8px 0; }
.status { font-size: 13px; opacity: .6; margin-bottom: 10px; }
button { width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
button:disabled { background: #ccc; cursor: not-allowed; }

/* Фиксированная корзина */
#cartBox {
  position: fixed;
  top: 80px;
  right: 10px;
  width: 260px;
  background: #fff;
  padding: 14px;
  border-radius: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,.05);
  display: none;
  z-index: 1000;
}
#cartBox h3 { margin-top: 0; }
#cartList { list-style: none; padding: 0; margin: 0 0 10px 0; max-height: 300px; overflow-y: auto; }

#orderBox { display:none; margin-top:12px; padding:14px; background:#fff; border-radius:14px; box-shadow:0 2px 6px rgba(0,0,0,.05);}
input { width: 100%; padding: 10px; margin-bottom: 10px; font-size: 14px; border-radius: 6px; border: 1px solid #ccc; }
</style>
</head>
<body>
<header>🌸 Flurimo</header>

<div id="catalog"></div>

<div id="cartBox">
  <h3>Корзина 🛒</h3>
  <ul id="cartList"></ul>
  <button onclick="openOrderForm()">Оформить корзину</button>
</div>

<div id="orderBox">
  <h3>Оформление заказа</h3>
  <input id="customerName" placeholder="Ваше имя">
  <input id="customerPhone" placeholder="Телефон">
  <button onclick="sendOrder()">Отправить заказ</button>
</div>

<script>
/* 🔗 Сюда вставь свою ссылку Web App с doGet */
const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwXpJHTIoEBvjtUkH0lK5pqvhfpMAKWHopgNbYRYrAPTmC3y4u53vIZ-N6hDYCVcCBVoA/exec";

/* 🛍 Товары */
const products = [
{name:"Тюльпаны Красные", description:"Охапка 50 шт", price:7000, quantity:50, image:"images/tulipred01.jpg"},
{name:"Тюльпаны Тиз Бутс", description:"Охапка 50 шт", price:9000, quantity:50, image:"images/tulipspich02.jpg"},
{name:"Тюльпаны Белые", description:"Охапка 50 шт", price:8000, quantity:50, image:"images/tulipb01.jpg"},
{name:"Тюльпаны Коламбус", description:"Охапка 50 шт", price:7000, quantity:50, image:"images/tulipk01.jpg"},
{name:"Тюльпаны Розовые", description:"Охапка 50 шт", price:8000, quantity:50, image:"images/tulipr01.jpg"},
{name:"Тюльпаны Сиреневые", description:"Охапка 50 шт", price:8000, quantity:50, image:"images/tulips01.jpg"},
{name:"Тюльпаны Желтые", description:"Охапка 50 шт", price:8000, quantity:50, image:"images/tulipseloy01.jpg"},
{name:"Подсолнух", description:"Охапка 10 шт", price:3200, quantity:10, image:"images/podsoln.jpg"},  
{name:"Пион", description:"Охапка 10 шт", price:8000, quantity:10, image:"images/piong01.jpg"},
{name:"Ветки Магнолии", description:"Охапка 5 шт", price:3500, quantity:5, image:"images/magnolia.jpg"},  
{name:"Роза кустовая Сильва Пинк", description:"Охапка 10 шт", price:5000, quantity:10, image:"images/rosesp01.jpg"},
{name:"Роза кустовая", description:"Охапка 10 шт", price:4800, quantity:10, image:"images/rosejulia01.jpg"},
{name:"Роза кустовая Бомбастик", description:"Охапка 10 шт", price:4900, quantity:10, image:"images/rosebomb01.jpg"},
{name:"Роза кустовая Мисти баблз", description:"Охапка 10 шт", price:4900, quantity:10, image:"images/rosem01.jpg"},
{name:"Роза Мандарин", description:"Охапка 20 шт", price:6500, quantity:20, image:"images/rosebomandarin01.jpg"},  
{name:"Роза белая", description:"Охапка 20 шт", price:5000, quantity:20, image:"images/rosemon01.jpg"},
{name:"Роза красная", description:"Охапка 20 шт", price:5000, quantity:20, image:"images/roseexpl.jpg"},
{name:"Роза Пинк охара", description:"Охапка 15 шт", price:6500, quantity:15, image:"images/rosepx01.jpg"},
{name:"Роза Кантри блю", description:"Охапка 20 шт", price:6500, quantity:20, image:"images/rosekb01.jpg"},
{name:"Ранункулюсы белые", description:"Охапка 10 шт", price:5000, quantity:10, image:"images/ranynb01.jpg"},
{name:"Ранункулюсы розовые", description:"Охапка 10 шт", price:5000, quantity:10, image:"images/ranynr01.jpg"},
{name:"Ранункулюсы ханой", description:"Охапка 10 шт", price:5000, quantity:10, image:"images/ranynx01.jpg"},
{name:"Гиацинты", description:"Охапка 25 шт", price:6250, quantity:25, image:"images/gioc.jpg"},
{name:"Гвоздика кустовая розовая", description:"Охапка 20 шт", price:2000, quantity:20, image:"images/carnation01.jpg"},
 {name:"Гвоздика кустовая белая", description:"Охапка 20 шт", price:2000, quantity:20, image:"images/carnation02.jpg"}, 
{name:"Гвоздика Грин Трик", description:"Охапка 10 шт", price:2200, quantity:10, image:"images/greentrick01.jpg"},
{name:"Гвоздика белая", description:"Охапка 20 шт", price:3000, quantity:20, image:"images/carnationw01.jpg"},
{name:"Гвоздика розовая", description:"Охапка 20 шт", price:3000, quantity:20, image:"images/carnation01r.jpg"},
{name:"Гвоздика сиреневая", description:"Охапка 20 шт", price:3000, quantity:20, image:"images/carnatiosiren.jpg"},
{name:"Эустома белая", description:"Охапка 10 шт", price:3800, quantity:10, image:"images/carnationyst02.jpg"},
{name:"Хризантема Бигуди", description:"Охапка 10 шт", price:5000, quantity:10, image:"images/xrizb01.jpg"},
{name:"Фрезия белая", description:"Охапка 10 шт", price:2500, quantity:10, image:"images/carnationfrb.jpg"},
{name:"Ирис синий", description:"Охапка 50 шт", price:4800, quantity:50, image:"images/irissin.jpg"},
{name:"Ирис желтый", description:"Охапка 50 шт", price:6000, quantity:50, image:"images/irissinj.jpg"},
{name:"Каллы белые", description:"Охапка 10 шт", price:4000, quantity:10, image:"images/kaallb.jpg"},
{name:"Каллы розовые", description:"Охапка 10 шт", price:5000, quantity:10, image:"images/kaallr.jpg"},  
{name:"Гиперикум", description:"Охапка 10 шт", price:3000, quantity:10, image:"images/giper.jpg"},
{name:"Гортензия белая", description:"Охапка 10 шт", price:5000, quantity:10, image:"images/gortenzv.jpg"},
{name:"Гортензия розовая", description:"Охапка 10 шт", price:5000, quantity:10, image:"images/gortenzroz.jpg"},
{name:"Гортензия голубая", description:"Охапка 10 шт", price:5000, quantity:10, image:"images/gortenzblue.jpg"}
];

let cart = [];
const catalog = document.getElementById("catalog");

/* Создание карточек товаров */
products.forEach(p => {
  const card = document.createElement("div");
  card.className = "card";
  const disabled = p.quantity <= 0;
  card.innerHTML = `
    <img src="${p.image}" alt="${p.name}">
    <div class="card-content">
      <h3>${p.name}</h3>
      <p>${p.description}</p>
      <div class="status">${disabled ? "Нет в наличии" : "В наличии: "+p.quantity}</div>
      <div class="price">${p.price} ₽</div>
      <button ${disabled ? "disabled" : ""} onclick="addToCart('${p.name}',${p.price},1)">Добавить в корзину</button>
    </div>
  `;
  catalog.appendChild(card);
});

/* Добавление товара в корзину */
function addToCart(name, price, quantity){
  const existing = cart.find(i => i.name === name);
  if(existing) existing.quantity += quantity;
  else cart.push({name, price, quantity});
  updateCartDisplay();
}

/* Обновление видимой корзины */
function updateCartDisplay(){
  const cartBox = document.getElementById("cartBox");
  const cartList = document.getElementById("cartList");
  cartList.innerHTML = "";
  if(cart.length === 0){
    cartBox.style.display = "none";
    return;
  }
  cartBox.style.display = "block";
  cart.forEach(item=>{
    const li = document.createElement("li");
    li.textContent = `${item.name} — ${item.price} ₽ × ${item.quantity}`;
    cartList.appendChild(li);
  });
}

/* Открытие формы оформления */
function openOrderForm(){
  document.getElementById("orderBox").style.display = "block";
  window.scrollTo(0, document.body.scrollHeight);
}

/* Отправка заказа через doGet */
function sendOrder(){
  const customerName = document.getElementById("customerName").value;
  const customerPhone = document.getElementById("customerPhone").value;

  if(!customerName || !customerPhone){
    alert("Введите имя и телефон");
    return;
  }

  cart.forEach(item => {
    const url = `${GOOGLE_SHEET_URL}?name=${encodeURIComponent(item.name)}&price=${item.price}&quantity=${item.quantity}&customer_name=${encodeURIComponent(customerName)}&customer_phone=${encodeURIComponent(customerPhone)}`;
    fetch(url)
      .then(res => res.json())
      .then(()=>console.log("Заказ отправлен!"))
      .catch(()=>alert("❌ Ошибка отправки"));
  });

  alert("✅ Заказ отправлен!");
  cart = [];
  updateCartDisplay();
  document.getElementById("orderBox").style.display = "none";
  document.getElementById("customerName").value = "";
  document.getElementById("customerPhone").value = "";
}
</script>
</body>
</html>
